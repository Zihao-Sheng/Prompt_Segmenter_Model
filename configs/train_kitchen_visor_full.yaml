# ============================================================
# YOLO11-seg  Kitchen Visor  全量训练配置
# train: 32857张  val: 7747张  nc: 64
# ============================================================

model: yolo11n-seg.pt          # 先跑 nano 验证收敛；确认后换 yolo11s-seg.pt

data: C:/Users/18447/Detector/data/kitchen_visor_yolo/data.yaml

# ── 训练规模 ──────────────────────────────────────────────
epochs: 120
patience: 25

# ── 输入分辨率 ────────────────────────────────────────────
imgsz: 640

# ── 批次 ──────────────────────────────────────────────────
batch: 32                      # 全量数据可以用更大 batch；显存不够改 16

# ── 学习率 ────────────────────────────────────────────────
lr0: 0.001
lrf: 0.1                       # 最终 lr = 0.0001
warmup_epochs: 5               # 全量数据 warmup 可以稍长

# ── 优化器 ────────────────────────────────────────────────
optimizer: AdamW
weight_decay: 0.0005
momentum: 0.937

# ── 数据增强 ──────────────────────────────────────────────
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0
translate: 0.1
scale: 0.5
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
copy_paste: 0.4                # 全量数据 copy_paste 可以开大一点帮助稀有类
mixup: 0.05

# ── 输出 ──────────────────────────────────────────────────
project: runs/kitchen_visor
name: nano_full_v1
save_period: 10

# ── 设备 ──────────────────────────────────────────────────
device: 0
workers: 8                     # 全量数据 IO 瓶颈更明显，多开 worker

# ── 其他 ──────────────────────────────────────────────────
plots: true
verbose: true
val: true
